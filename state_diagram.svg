<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7f8794"/></marker>
    <style>
      .node{fill:#161b22;stroke:#3b82f6;stroke-width:2}
      .ped{stroke:#a855f7} .farm{stroke:#22c55e}
      .sid{fill:#e6edf3;font-size:18px;font-weight:700;text-anchor:middle}
      .desc{fill:#8b949e;font-size:10px;text-anchor:middle}
      .edge{stroke:#7f8794;stroke-width:2;fill:none}
      .lbl{fill:#cdd3da;font-size:11px;text-anchor:middle}
      .t{fill:#e6edf3;font-size:18px;font-weight:700}
      .leg{fill:#8b949e;font-size:11px}
    </style>
  </defs>
  <rect width="720" height="640" fill="#0e1116"/>
  <text x="26" y="34" class="t">Traffic Light Controller — 8-state FSM (highway · farm road · pedestrian)</text>

  <!-- highway spine: S0 S1 S2 S3 -->
  <!-- S0(360,90) S1(360,200) S2(360,310) S3(360,420) -->
  <path class="edge" d="M360,126 L360,162" marker-end="url(#a)"/>
  <path class="edge" d="M360,236 L360,272" marker-end="url(#a)"/>
  <path class="edge" d="M360,346 L360,382" marker-end="url(#a)"/>
  <text class="lbl" x="392" y="148">≥1 s</text>
  <text class="lbl" x="392" y="258">≥30 s &amp; (car|ped)</text>
  <text class="lbl" x="392" y="368">≥3 s</text>

  <!-- farm branch (right): S3->S4->S5->S3 -->
  <!-- S4(560,420) S5(560,530) -->
  <path class="edge farm" d="M396,420 L524,420" marker-end="url(#a)"/>
  <path class="edge" d="M560,456 L560,494" marker-end="url(#a)"/>
  <path class="edge" d="M524,520 C 440,520 430,452 392,432" marker-end="url(#a)"/>
  <text class="lbl" x="460" y="412">car</text>
  <text class="lbl" x="592" y="478">≥3 s</text>
  <text class="lbl" x="470" y="500">≥3 s</text>

  <!-- pedestrian branch (left): S3->S6->S7->S0 -->
  <!-- S6(160,420) S7(160,530) -->
  <path class="edge ped" d="M324,420 L196,420" marker-end="url(#a)"/>
  <path class="edge ped" d="M160,456 L160,494" marker-end="url(#a)"/>
  <path class="edge ped" d="M160,494 C 160,300 250,150 326,108" marker-end="url(#a)"/>
  <text class="lbl" x="252" y="412">ped</text>
  <text class="lbl" x="192" y="478">8 s</text>
  <text class="lbl" x="120" y="300">5 s</text>

  <!-- nodes -->
  <g><circle class="node" cx="360" cy="90"  r="36"/><text class="sid" x="360" y="86">S0</text><text class="desc" x="360" y="104">all red</text></g>
  <g><circle class="node" cx="360" cy="200" r="36"/><text class="sid" x="360" y="196">S1</text><text class="desc" x="360" y="214">hwy GRN</text></g>
  <g><circle class="node" cx="360" cy="310" r="36"/><text class="sid" x="360" y="306">S2</text><text class="desc" x="360" y="324">hwy YEL</text></g>
  <g><circle class="node" cx="360" cy="420" r="36"/><text class="sid" x="360" y="416">S3</text><text class="desc" x="360" y="434">decide</text></g>
  <g><circle class="node farm" cx="560" cy="420" r="36"/><text class="sid" x="560" y="416">S4</text><text class="desc" x="560" y="434">farm GRN</text></g>
  <g><circle class="node farm" cx="560" cy="530" r="36"/><text class="sid" x="560" y="526">S5</text><text class="desc" x="560" y="544">farm YEL</text></g>
  <g><circle class="node ped" cx="160" cy="420" r="36"/><text class="sid" x="160" y="416">S6</text><text class="desc" x="160" y="434">WALK</text></g>
  <g><circle class="node ped" cx="160" cy="530" r="36"/><text class="sid" x="160" y="526">S7</text><text class="desc" x="160" y="544">DON'T-WALK</text></g>

  <!-- legend -->
  <circle cx="30" cy="610" r="6" fill="none" stroke="#3b82f6" stroke-width="2"/><text class="leg" x="44" y="614">highway</text>
  <circle cx="120" cy="610" r="6" fill="none" stroke="#22c55e" stroke-width="2"/><text class="leg" x="134" y="614">farm road</text>
  <circle cx="220" cy="610" r="6" fill="none" stroke="#a855f7" stroke-width="2"/><text class="leg" x="234" y="614">pedestrian</text>
  <text class="leg" x="330" y="614">S3 priority: pedestrian → farm car → back to highway</text>
</svg>
